<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agendamentos · Usina Tracking</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root{
    --navy:#293556;--navy-2:#1f2d4a;--coral:#dc4a30;--amber:#f5a82a;--teal:#7fc7b8;
    --gray:#8a8e96;--bg:#f7f8fb;--card:#fff;--border:#e6e8ee;--ink:#222838;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
  .top{background:var(--navy-2);padding:16px 26px;display:flex;align-items:center;justify-content:space-between}
  .top img{height:30px}
  .top a{color:#c4cbdb;text-decoration:none;font-size:13px}
  .top a:hover{color:#fff}
  .wrap{max-width:1200px;margin:0 auto;padding:28px 26px}
  h1{font-size:22px;color:var(--navy);margin-bottom:4px}
  .sub{color:var(--gray);margin-bottom:22px;font-size:13px}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .chip{border:1px solid var(--border);background:var(--card);border-radius:999px;padding:7px 15px;
    cursor:pointer;font-size:13px;color:var(--navy);font-weight:600;transition:.15s}
  .chip:hover{border-color:var(--navy)}
  .chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .chip .n{opacity:.6;margin-left:6px;font-weight:500}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  th,td{padding:13px 16px;text-align:left;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
  th{background:var(--bg);color:var(--navy);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  tr:last-child td{border-bottom:none}
  tr.row{cursor:pointer}
  tr.row:hover{background:#fafbfd}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700}
  .b-agendada{background:#e8eefb;color:#2f4ea0}
  .b-realizada{background:#e6f5f1;color:#2b8a73}
  .b-no_show{background:#fdeee0;color:#a06a1e}
  .b-cancelada{background:#f2f3f6;color:#7b8194}
  .b-ganho{background:#e3f7e9;color:#1f8a45}
  .b-perdido{background:#fbe9e6;color:#b53c28}
  .when{font-weight:700;color:var(--navy)}
  .muted{color:var(--gray)}
  .detail{background:#fafbfd}
  .detail td{padding:18px 22px}
  .det-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:16px}
  .det-grid div b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--gray);margin-bottom:3px}
  .actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;border-top:1px solid var(--border);padding-top:16px}
  select,textarea{font:inherit;border:1px solid var(--border);border-radius:9px;padding:9px 12px;background:#fff;color:var(--ink)}
  textarea{width:100%;min-height:60px;margin:10px 0;resize:vertical}
  button{font:inherit;font-weight:700;border:none;border-radius:9px;padding:10px 20px;background:var(--navy);color:#fff;cursor:pointer}
  button:hover{background:var(--navy-2)}
  button.ghost{background:transparent;color:var(--navy);border:1px solid var(--border)}
  a.link{color:var(--coral);font-weight:600;text-decoration:none}
  .empty{padding:60px;text-align:center;color:var(--gray)}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:14px 22px;border-radius:12px;opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:none}
</style>
</head>
<body>
<div class="top">
  <img src="/assets/usina-brand/logo-color-text-white.png" alt="Usina do Tempo">
  <a href="/admin/">← voltar ao admin</a>
</div>
<div class="wrap">
  <h1>Agendamentos</h1>
  <div class="sub">Reuniões de apresentação geradas pela landing de venda do Usina Tracking.</div>
  <div class="filters" id="filters"></div>
  <div id="tableHost"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const STATUS_LABELS = {agendada:'Agendada',realizada:'Realizada',no_show:'No-show',cancelada:'Cancelada',ganho:'Ganho',perdido:'Perdido'};
let DATA = {bookings:[],counts:{},statuses:[]};
let filter = '';
let openId = null;

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

function fmtWhen(iso){
  try{
    const d=new Date(iso);
    return new Intl.DateTimeFormat('pt-BR',{timeZone:'America/Sao_Paulo',weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).format(d);
  }catch(_){return iso;}
}
function fmtDate(unix){return new Intl.DateTimeFormat('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}).format(new Date(unix*1000));}

async function load(){
  const qs = filter ? ('?status='+filter) : '';
  const r = await fetch('/admin/bookings'+qs,{credentials:'include'});
  if(r.status===401||r.status===403){ location.replace('/admin/'); return; }
  if(!r.ok){ document.getElementById('tableHost').innerHTML='<div class="empty">Erro ao carregar.</div>'; return; }
  DATA = await r.json();
  renderFilters(); renderTable();
}

function renderFilters(){
  const total = Object.values(DATA.counts).reduce((a,b)=>a+b,0);
  let html = `<div class="chip ${filter===''?'on':''}" data-f="">Todos <span class="n">${total}</span></div>`;
  for(const s of DATA.statuses){
    html += `<div class="chip ${filter===s?'on':''}" data-f="${s}">${STATUS_LABELS[s]} <span class="n">${DATA.counts[s]||0}</span></div>`;
  }
  const f=document.getElementById('filters'); f.innerHTML=html;
  f.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{filter=c.dataset.f;openId=null;load();});
}

function renderTable(){
  const host=document.getElementById('tableHost');
  if(!DATA.bookings.length){ host.innerHTML='<div class="empty">Nenhum agendamento ainda.</div>'; return; }
  let rows='';
  for(const b of DATA.bookings){
    const origem=[b.utm_source,b.utm_medium,b.utm_campaign].filter(Boolean).join(' / ')||(b.fbclid?'Meta':b.gclid?'Google':'direto');
    rows+=`<tr class="row" data-id="${b.id}">
      <td class="when">${fmtWhen(b.slot_start_iso)}</td>
      <td><b>${esc(b.name)}</b><br><span class="muted">${esc(b.email)}</span></td>
      <td>${esc(b.company||'—')}</td>
      <td><span class="muted">${esc(origem)}</span></td>
      <td><span class="badge b-${b.status}">${STATUS_LABELS[b.status]}</span></td>
      <td class="muted">${fmtDate(b.created_at)}</td>
    </tr>`;
    if(openId===b.id) rows+=detailRow(b);
  }
  host.innerHTML=`<table><thead><tr>
    <th>Quando (Brasília)</th><th>Lead</th><th>Empresa</th><th>Origem</th><th>Status</th><th>Criado</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
  host.querySelectorAll('tr.row').forEach(tr=>tr.onclick=()=>{openId=openId===tr.dataset.id?null:tr.dataset.id;renderTable();});
}

function detailRow(b){
  const opts=DATA.statuses.map(s=>`<option value="${s}" ${s===b.status?'selected':''}>${STATUS_LABELS[s]}</option>`).join('');
  const emailState=[
    b.confirmation_sent?'confirmação ✓':'confirmação ✗',
    b.reminded_24h?'lembrete 24h ✓':'',
    b.reminded_1h?'lembrete 1h ✓':'',
    b.followup_stage?('follow-up '+['','D+1','D+3','D+7'][b.followup_stage]):''
  ].filter(Boolean).join(' · ');
  return `<tr class="detail"><td colspan="6">
    <div class="det-grid">
      <div><b>Contato</b>${esc(b.name)} &lt;${esc(b.email)}&gt;${b.phone?(' · '+esc(b.phone)):''}</div>
      <div><b>Reunião</b>${b.meet_url?`<a class="link" href="${b.meet_url}" target="_blank">Google Meet</a>`:'—'} ${b.gcal_html_link?`· <a class="link" href="${b.gcal_html_link}" target="_blank">Google Agenda</a>`:''}</div>
      <div><b>Atribuição</b>${esc([b.utm_source,b.utm_medium,b.utm_campaign].filter(Boolean).join(' / ')||'—')}</div>
      <div><b>Página</b><span class="muted">${esc(b.landing_url||'—')}</span></div>
      <div><b>Mensagem</b>${esc(b.message||'—')}</div>
      <div><b>E-mails</b><span class="muted">${emailState||'—'}</span></div>
    </div>
    <textarea id="notes-${b.id}" placeholder="Anotações internas...">${esc(b.notes||'')}</textarea>
    <div class="actions">
      <label>Status: <select id="st-${b.id}">${opts}</select></label>
      <button onclick="save('${b.id}')">Salvar</button>
      <button class="ghost" onclick="openId=null;renderTable()">Fechar</button>
    </div>
  </td></tr>`;
}

async function save(id){
  const status=document.getElementById('st-'+id).value;
  const notes=document.getElementById('notes-'+id).value;
  const r=await fetch('/admin/bookings',{method:'PATCH',credentials:'include',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status,notes})});
  if(r.ok){ toast('Salvo'); openId=null; load(); }
  else if(r.status===401||r.status===403){ location.replace('/admin/'); }
  else { const e=await r.json().catch(()=>({})); toast('Erro: '+(e.error||r.status)); }
}

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
load();
</script>
</body>
</html>
